<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏测评网 - 排行榜</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .ranking-item {
            display: flex;
            align-items: center;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .ranking-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .ranking-number {
            width: 60px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #f0f0f0;
            color: #333;
        }
        
        .ranking-number.top3 {
            background-color: #4CAF50;
            color: #fff;
        }
        
        .ranking-game-info {
            flex: 1;
            padding: 15px;
            display: flex;
            align-items: center;
        }
        
        .ranking-game-cover {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
        }
        
        .ranking-game-details {
            flex: 1;
        }
        
        .ranking-game-details h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .ranking-game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }
        
        .ranking-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }
        
        .ranking-views {
            color: #4CAF50;
            font-weight: 500;
        }
        
        .ranking-score {
            background-color: #4CAF50;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">GameReview</a>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="games.html">游戏库</a></li>
                    <li><a href="ranking.html">排行榜</a></li>
                    <li id="admin-link" style="display: none;"><a href="admin.html">管理</a></li>
                </ul>
            </nav>
            <div class="auth-buttons" id="auth-buttons">
                <a href="login.html" class="btn btn-secondary">登录</a>
                <a href="register.html" class="btn btn-primary">注册</a>
            </div>
            <div class="user-info" id="user-info" style="display: none;">
                <span id="username"></span>
                <button id="logout-btn" class="btn btn-secondary">退出</button>
            </div>
        </div>
    </header>
    
    <script>
        // 检查用户登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            
            if (user && token) {
                const userObj = JSON.parse(user);
                document.getElementById('username').textContent = userObj.username;
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                
                // 如果是管理员，显示管理链接
                if (userObj.role === 'admin') {
                    document.getElementById('admin-link').style.display = 'block';
                }
            }
        }
        
        // 退出登录
        document.getElementById('logout-btn')?.addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });
        
        // 页面加载时检查登录状态
        checkLoginStatus();
    </script>

    <!-- 搜索栏 -->
    <div class="search-container">
        <div class="container">
            <form class="search-form">
                <input type="text" class="search-input" placeholder="搜索游戏...">
                <button type="submit" class="search-btn">搜索</button>
            </form>
        </div>
    </div>

    <!-- 排行榜内容 -->
    <div class="container">
        <div class="content-section">
            <h2 class="section-title">游戏排行榜</h2>
            <p class="section-subtitle" style="margin-bottom: 30px; color: #666;">按照浏览量从高到低排序</p>
            
            <div class="ranking-list" id="rankingList"></div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-column">
                    <h3>关于我们</h3>
                    <ul>
                        <li><a href="#">网站简介</a></li>
                        <li><a href="#">联系方式</a></li>
                        <li><a href="#">加入我们</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h3>游戏分类</h3>
                    <ul>
                        <li><a href="#">动作冒险</a></li>
                        <li><a href="#">角色扮演</a></li>
                        <li><a href="#">射击游戏</a></li>
                        <li><a href="#">策略游戏</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h3>平台</h3>
                    <ul>
                        <li><a href="#">PC</a></li>
                        <li><a href="#">PlayStation</a></li>
                        <li><a href="#">Xbox</a></li>
                        <li><a href="#">Switch</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h3>关注我们</h3>
                    <ul>
                        <li><a href="#">微博</a></li>
                        <li><a href="#">微信</a></li>
                        <li><a href="#">B站</a></li>
                        <li><a href="#">知乎</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 GameReview 游戏测评网. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
